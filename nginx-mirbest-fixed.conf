# /etc/nginx/sites-enabled/mirbest  — исправленная версия
# Изменение: вебхук Stripe выведен из-под Basic Auth, чтобы Stripe мог
# достучаться до /Payments/Webhook (иначе 401 и заказ не переходит в "Bezahlt").

server {
    server_name mirbest.de www.mirbest.de;

    # Basic Auth на весь сайт (закрытие от посторонних на этапе разработки).
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 20M;

    # --- Stripe webhook: БЕЗ Basic Auth ---
    # location ~* — регистронезависимо и имеет приоритет над "location /",
    # поэтому неважно, в каком регистре Stripe вызовет URL.
    location ~* ^/payments/webhook {
        auth_basic off;                     # ← ключевая строка
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mirbest.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mirbest.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
