services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD:?Setze DB_SA_PASSWORD in .env}"
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db;Database=AutoPartsStoreDb;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=true"
      # Stripe/Smtp/SeedAdmin — задавать через .env или секреты хостинга,
      # в образ и в этот файл не зашивать.
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY:-}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:-}"
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL:-}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD:-}"

volumes:
  db-data:
